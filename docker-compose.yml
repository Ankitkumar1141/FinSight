

services:
  financial-rag:
    build: .
    container_name: financial-rag
    ports:
      - "7860:7860"
    env_file:
      - .env                       # picks up MISTRAL_API_KEY
    volumes:
      - ./data:/app/data           # persist ChromaDB index and uploads
      - ./logs:/app/logs           # persist logs
    restart: unless-stopped
